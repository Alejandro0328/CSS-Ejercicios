<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #333; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 150vh;  }

      
        .hero-header {
            background-color: #d1b2d9; 
            padding: 15px;
            border: 2px solid #555; 
            position: sticky; 
            top: 0;
            z-index: 1000;
        }


        .nav-list {
            display: flex; 
            align-items: center; 
            list-style: none; 
        }


        .nav-item {
            margin-right: 20px; 
            color: white;
            font-size: 1.2rem;
            padding: 10px 20px;
        }

        .nav-link {
            color: white;
            text-decoration: none;
        }
        .nav-item:hover{
            background-color: #0000ff;
        }
    </style>
</head>
<body>

    <header class="hero-header">
        <nav>
            <ul class="nav-list">
                <li class="nav-item">
                    <a href="#" class="nav-link">Inicio</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">¿Quienes Somos?</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Contacto</a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        </main>

</body>
</html>
